<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracked" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Tracked</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #0a0a0a;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --bg4: #242424;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f5f5f5;
      --text2: #888;
      --text3: #555;
      --green: #1D9E75;
      --green-dim: rgba(29,158,117,0.15);
      --blue: #378ADD;
      --blue-dim: rgba(55,138,221,0.15);
      --accent: #1D9E75;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overscroll-behavior: none;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    .nav {
      display: flex;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-tab {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .nav-tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* SCREENS */
    .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 40px; }
    .screen.active { display: block; }

    /* DAILY */
    .day-header {
      padding: 20px 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .day-nav-btn {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      font-size: 16px;
      transition: background 0.15s;
    }
    .day-nav-btn:active { background: var(--bg4); }
    .day-label { font-size: 15px; font-weight: 500; color: var(--text); }
    .day-sublabel { font-size: 12px; color: var(--text2); text-align: center; margin-top: 2px; }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 16px;
    }
    .stat-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .stat-label { font-size: 11px; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }
    .stat-target { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .progress-bar { height: 3px; background: var(--bg4); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .fill-cal { background: var(--green); }
    .fill-prot { background: var(--blue); }

    .section { padding: 0 16px; margin-bottom: 4px; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 12px 0 8px;
    }

    .meal-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-user-select: none;
      user-select: none;
    }
    .meal-card:active { transform: scale(0.98); }
    .meal-card.eaten {
      border-color: rgba(29,158,117,0.4);
      background: var(--green-dim);
    }
    .meal-icon { font-size: 24px; width: 38px; text-align: center; flex-shrink: 0; }
    .meal-info { flex: 1; min-width: 0; }
    .meal-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .meal-macros { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .meal-card.eaten .check {
      background: var(--green);
      border-color: var(--green);
    }
    .check svg { display: none; }
    .meal-card.eaten .check svg { display: block; }

    .add-btn {
      margin: 12px 16px 0;
      width: calc(100% - 32px);
      background: none;
      border: 0.5px dashed var(--border2);
      border-radius: 14px;
      padding: 12px;
      color: var(--text2);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .add-btn:active { background: var(--bg2); }

    /* WEEKLY */
    .weekly-wrap { padding: 20px 16px; }
    .weekly-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 16px; }

    .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .week-label { font-size: 14px; font-weight: 500; color: var(--text); }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 24px;
    }
    .week-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .week-day-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: 0.04em; }
    .week-dot {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .week-dot.today { border-color: var(--border2); color: var(--text2); }
    .week-dot.has-data { background: var(--green-dim); border-color: rgba(29,158,117,0.4); color: var(--green); }
    .week-dot.full { background: var(--green); border-color: var(--green); color: white; }

    .week-meals { margin-top: 8px; }
    .week-meal-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .week-meal-icon { font-size: 18px; width: 32px; flex-shrink: 0; }
    .week-meal-name { flex: 1; font-size: 13px; color: var(--text2); }
    .week-bars { display: flex; gap: 3px; }
    .week-bar {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: var(--bg3);
      border: 0.5px solid var(--border);
    }
    .week-bar.done { background: var(--green); border-color: var(--green); }

    /* MONTHLY */
    .monthly-wrap { padding: 20px 16px; }
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .month-label { font-size: 15px; font-weight: 500; color: var(--text); }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 24px;
    }
    .cal-day-header { font-size: 10px; color: var(--text3); text-align: center; padding: 4px 0; font-weight: 500; }
    .cal-cell {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text3);
      background: var(--bg2);
      border: 0.5px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .cal-cell.empty { background: none; border-color: transparent; cursor: default; }
    .cal-cell.today { border-color: var(--border2); color: var(--text2); }
    .cal-cell.has-data { background: var(--green-dim); border-color: rgba(29,158,117,0.35); color: var(--green); }
    .cal-cell.full { background: var(--green); border-color: var(--green); color: white; }
    .cal-cell.future { opacity: 0.3; cursor: default; }

    .month-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .month-stat {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .month-stat-val { font-size: 22px; font-weight: 600; color: var(--text); }
    .month-stat-label { font-size: 10px; color: var(--text2); margin-top: 4px; letter-spacing: 0.04em; }

    /* MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 40px;
      width: 100%;
      max-width: 430px;
    }
    .modal-handle { width: 36px; height: 4px; background: var(--bg4); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
    .modal label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; }
    .modal input, .modal select {
      width: 100%;
      background: var(--bg3);
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      padding: 11px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 12px;
      outline: none;
    }
    .modal input:focus, .modal select:focus { border-color: var(--green); }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .modal-row input { margin-bottom: 0; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn { flex: 1; padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-cancel { background: var(--bg3); color: var(--text2); }
    .btn-save { background: var(--green); color: white; }
    .btn:active { transform: scale(0.97); }

    .legend { display: flex; gap: 16px; margin-top: 8px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div class="nav-tab active" onclick="showScreen('daily')">Daily</div>
    <div class="nav-tab" onclick="showScreen('weekly')">Weekly</div>
    <div class="nav-tab" onclick="showScreen('monthly')">Monthly</div>
  </div>

  <!-- DAILY -->
  <div class="screen active" id="screen-daily">
    <div class="day-header">
      <div class="day-nav-btn" onclick="changeDay(-1)">&#8592;</div>
      <div style="text-align:center">
        <div class="day-label" id="dayLabel"></div>
        <div class="day-sublabel" id="daySubLabel"></div>
      </div>
      <div class="day-nav-btn" onclick="changeDay(1)">&#8594;</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Calories</div>
        <div class="stat-value" id="calVal">0</div>
        <div class="stat-target" id="calTarget">/ 2,865 kcal</div>
        <div class="progress-bar"><div class="progress-fill fill-cal" id="calBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Protein</div>
        <div class="stat-value" id="protVal">0g</div>
        <div class="stat-target">/ 183g</div>
        <div class="progress-bar"><div class="progress-fill fill-prot" id="protBar" style="width:0%"></div></div>
      </div>
    </div>

    <div id="mealsContainer"></div>
    <button class="add-btn" onclick="openModal()">+ Add custom meal</button>
  </div>

  <!-- WEEKLY -->
  <div class="screen" id="screen-weekly">
    <div class="weekly-wrap">
      <div class="week-nav">
        <div class="day-nav-btn" onclick="changeWeek(-1)">&#8592;</div>
        <div class="week-label" id="weekLabel"></div>
        <div class="day-nav-btn" onclick="changeWeek(1)">&#8594;</div>
      </div>
      <div class="week-grid" id="weekGrid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--bg3);border:0.5px solid var(--border)"></div> No data</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green-dim);border:0.5px solid rgba(29,158,117,0.4)"></div> Partial</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Complete</div>
      </div>
      <div class="week-meals" id="weekMeals"></div>
    </div>
  </div>

  <!-- MONTHLY -->
  <div class="screen" id="screen-monthly">
    <div class="monthly-wrap">
      <div class="month-nav">
        <div class="day-nav-btn" onclick="changeMonth(-1)">&#8592;</div>
        <div class="month-label" id="monthLabel"></div>
        <div class="day-nav-btn" onclick="changeMonth(1)">&#8594;</div>
      </div>
      <div class="month-stats" id="monthStats"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add custom meal</div>
    <label>Category</label>
    <select id="mealCat">
      <option value="breakfast">Breakfast</option>
      <option value="snack1">Snack 1</option>
      <option value="lunch">Lunch</option>
      <option value="snack2">Snack 2</option>
      <option value="dinner">Dinner</option>
    </select>
    <label>Meal name</label>
    <input type="text" id="mealName" placeholder="e.g. Protein shake" />
    <label>Icon (emoji)</label>
    <input type="text" id="mealIcon" placeholder="🍽" />
    <div class="modal-row">
      <div>
        <label>Calories</label>
        <input type="number" id="mealCal" placeholder="0" />
      </div>
      <div>
        <label>Protein (g)</label>
        <input type="number" id="mealProt" placeholder="0" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveCustomMeal()">Add meal</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_MEALS = {
  breakfast: [
    { id: 'b1', name: 'Egg sandwich x2', icon: '🍳', cal: 992, prot: 35 },
    { id: 'b2', name: 'Nada protein milk', icon: '🥛', cal: 270, prot: 30 }
  ],
  snack1: [
    { id: 's1a', name: 'Nada Greek yogurt', icon: '🫙', cal: 100, prot: 16 },
    { id: 's1b', name: 'Banana', icon: '🍌', cal: 105, prot: 1 }
  ],
  lunch: [
    { id: 'l1', name: 'Chicken breast 200g', icon: '🍗', cal: 330, prot: 46 },
    { id: 'l2', name: 'Basmati rice 100g', icon: '🍚', cal: 130, prot: 3 },
    { id: 'l3', name: 'Broccoli 100g', icon: '🥦', cal: 35, prot: 3 }
  ],
  snack2: [
    { id: 'sn2', name: 'Castania mixed nuts 40g', icon: '🥜', cal: 240, prot: 6 }
  ],
  dinner: [
    { id: 'd1', name: 'Chicken shawarma x3', icon: '🌯', cal: 900, prot: 50 }
  ]
};

const SECTION_LABELS = { breakfast:'Breakfast', snack1:'Snack 1', lunch:'Lunch', snack2:'Snack 2', dinner:'Dinner' };
const TARGET_CAL = 2865;
const TARGET_PROT = 183;
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let dayOffset = 0;
let weekOffset = 0;
let monthOffset = 0;
let currentScreen = 'daily';

function getStorage() {
  try { return JSON.parse(localStorage.getItem('tracked_data') || '{}'); } catch { return {}; }
}
function saveStorage(d) {
  try { localStorage.setItem('tracked_data', JSON.stringify(d)); } catch {}
}
function getCustomMeals() {
  try { return JSON.parse(localStorage.getItem('tracked_custom') || '{}'); } catch { return {}; }
}
function saveCustomMeals(d) {
  try { localStorage.setItem('tracked_custom', JSON.stringify(d)); } catch {}
}

function dateKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}
function keyFromDate(d) { return d.toISOString().split('T')[0]; }

function getMeals(key) {
  const custom = getCustomMeals();
  const result = JSON.parse(JSON.stringify(DEFAULT_MEALS));
  const dayCustom = custom[key] || [];
  dayCustom.forEach(m => { if (!result[m.cat]) result[m.cat] = []; result[m.cat].push(m); });
  return result;
}

function getDayStats(key) {
  const data = getStorage();
  const eaten = (data[key] || {});
  const meals = getMeals(key);
  let cal = 0, prot = 0, total = 0, done = 0;
  Object.values(meals).flat().forEach(m => {
    total++;
    if (eaten[m.id]) { cal += m.cal; prot += m.prot; done++; }
  });
  return { cal, prot, total, done };
}

function showScreen(name) {
  currentScreen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab')[['daily','weekly','monthly'].indexOf(name)].classList.add('active');
  if (name === 'weekly') renderWeekly();
  if (name === 'monthly') renderMonthly();
}

function changeDay(dir) {
  if (dayOffset + dir > 0) return;
  dayOffset += dir;
  renderDaily();
}
function changeWeek(dir) { weekOffset += dir; renderWeekly(); }
function changeMonth(dir) { monthOffset += dir; renderMonthly(); }

function renderDaily() {
  const key = dateKey(dayOffset);
  const data = getStorage();
  const eaten = data[key] || {};
  const meals = getMeals(key);

  const d = new Date(); d.setDate(d.getDate() + dayOffset);
  document.getElementById('dayLabel').textContent = dayOffset === 0 ? 'Today' : dayOffset === -1 ? 'Yesterday' : d.toLocaleDateString('en-GB', { weekday:'long' });
  document.getElementById('daySubLabel').textContent = d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  let totalCal = 0, totalProt = 0;
  Object.values(meals).flat().forEach(m => { if (eaten[m.id]) { totalCal += m.cal; totalProt += m.prot; } });

  document.getElementById('calVal').textContent = totalCal.toLocaleString();
  document.getElementById('protVal').textContent = totalProt + 'g';
  document.getElementById('calBar').style.width = Math.min(100, Math.round(totalCal / TARGET_CAL * 100)) + '%';
  document.getElementById('protBar').style.width = Math.min(100, Math.round(totalProt / TARGET_PROT * 100)) + '%';

  const container = document.getElementById('mealsContainer');
  container.innerHTML = '';

  Object.entries(meals).forEach(([cat, items]) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = '<div class="section-label">' + SECTION_LABELS[cat] + '</div>';
    items.forEach(meal => {
      const isEaten = !!eaten[meal.id];
      const card = document.createElement('div');
      card.className = 'meal-card' + (isEaten ? ' eaten' : '');
      card.onclick = () => toggleMeal(meal.id);
      card.innerHTML = `
        <div class="meal-icon">${meal.icon}</div>
        <div class="meal-info">
          <div class="meal-name">${meal.name}</div>
          <div class="meal-macros">${meal.cal.toLocaleString()} kcal &middot; ${meal.prot}g protein</div>
        </div>
        <div class="check">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>`;
      sec.appendChild(card);
    });
    container.appendChild(sec);
  });
}

function toggleMeal(id) {
  const key = dateKey(dayOffset);
  const data = getStorage();
  if (!data[key]) data[key] = {};
  data[key][id] = !data[key][id];
  if (!data[key][id]) delete data[key][id];
  saveStorage(data);
  renderDaily();
}

function renderWeekly() {
  const today = new Date();
  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay() + weekOffset * 7);

  const days = Array.from({length:7}, (_,i) => { const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i); return d; });
  const startFmt = days[0].toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  const endFmt = days[6].toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  document.getElementById('weekLabel').textContent = startFmt + ' – ' + endFmt;

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  const todayKey = keyFromDate(today);

  days.forEach(d => {
    const key = keyFromDate(d);
    const isFuture = key > todayKey;
    const stats = isFuture ? {done:0,total:1} : getDayStats(key);
    const pct = stats.total ? stats.done / stats.total : 0;

    const col = document.createElement('div');
    col.className = 'week-col';
    let dotClass = 'week-dot';
    if (key === todayKey) dotClass += ' today';
    if (!isFuture && pct > 0 && pct < 1) dotClass += ' has-data';
    if (!isFuture && pct === 1) dotClass += ' full';

    col.innerHTML = `
      <div class="week-day-label">${DAY_NAMES[d.getDay()]}</div>
      <div class="${dotClass}" onclick="jumpToDay('${key}')">${d.getDate()}</div>
    `;
    grid.appendChild(col);
  });

  const allMeals = Object.values(DEFAULT_MEALS).flat();
  const mealsEl = document.getElementById('weekMeals');
  mealsEl.innerHTML = '';

  allMeals.forEach(meal => {
    const row = document.createElement('div');
    row.className = 'week-meal-row';
    const bars = days.map(d => {
      const key = keyFromDate(d);
      const isFuture = key > todayKey;
      const data = getStorage();
      const eaten = !isFuture && !!(data[key] || {})[meal.id];
      return `<div class="week-bar${eaten ? ' done' : ''}"></div>`;
    }).join('');
    row.innerHTML = `
      <div class="meal-icon" style="font-size:16px;width:28px">${meal.icon}</div>
      <div class="week-meal-name">${meal.name}</div>
      <div class="week-bars">${bars}</div>`;
    mealsEl.appendChild(row);
  });
}

function jumpToDay(key) {
  const today = new Date();
  const target = new Date(key);
  const diff = Math.round((target - today) / 86400000);
  dayOffset = diff;
  showScreen('daily');
}

function renderMonthly() {
  const today = new Date();
  const ref = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const year = ref.getFullYear();
  const month = ref.getMonth();
  document.getElementById('monthLabel').textContent = MONTH_NAMES[month] + ' ' + year;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayKey = keyFromDate(today);

  let streak = 0, completeDays = 0, totalLogged = 0;
  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(year, month, i);
    const key = keyFromDate(d);
    if (key > todayKey) continue;
    const stats = getDayStats(key);
    if (stats.done > 0) { totalLogged++; if (stats.done === stats.total) { completeDays++; streak++; } else streak = 0; }
  }

  document.getElementById('monthStats').innerHTML = `
    <div class="month-stat"><div class="month-stat-val">${completeDays}</div><div class="month-stat-label">Complete days</div></div>
    <div class="month-stat"><div class="month-stat-val">${totalLogged}</div><div class="month-stat-label">Days logged</div></div>
    <div class="month-stat"><div class="month-stat-val">${streak}</div><div class="month-stat-label">Current streak</div></div>
  `;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = DAY_NAMES.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="cal-cell empty"></div>';

  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(year, month, i);
    const key = keyFromDate(d);
    const isFuture = key > todayKey;
    const stats = isFuture ? {done:0,total:1} : getDayStats(key);
    const pct = stats.total ? stats.done / stats.total : 0;

    let cls = 'cal-cell';
    if (key === todayKey) cls += ' today';
    else if (isFuture) cls += ' future';
    else if (pct === 1) cls += ' full';
    else if (pct > 0) cls += ' has-data';

    grid.innerHTML += `<div class="${cls}" onclick="${!isFuture ? `jumpToDay('${key}')` : ''}">${i}</div>`;
  }
}

function openModal() { document.getElementById('overlay').classList.add('open'); }
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  ['mealName','mealIcon','mealCal','mealProt'].forEach(id => document.getElementById(id).value = '');
}

function saveCustomMeal() {
  const name = document.getElementById('mealName').value.trim();
  if (!name) return;
  const icon = document.getElementById('mealIcon').value.trim() || '🍽';
  const cal = parseInt(document.getElementById('mealCal').value) || 0;
  const prot = parseInt(document.getElementById('mealProt').value) || 0;
  const cat = document.getElementById('mealCat').value;
  const key = dateKey(dayOffset);
  const custom = getCustomMeals();
  if (!custom[key]) custom[key] = [];
  custom[key].push({ id: 'c_' + Date.now(), name, icon, cal, prot, cat });
  saveCustomMeals(custom);
  closeModal();
  renderDaily();
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderDaily();
</script>
